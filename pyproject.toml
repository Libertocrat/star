######################################
# Black (formatter)
######################################

[tool.black]
line-length = 88
target-version = ["py312"]
skip-string-normalization = false
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | build
  | deploy
  | dist
  | node_modules
)/
'''


######################################
# Ruff (linter + import sorting + security)
######################################

[tool.ruff]
target-version = "py312"
line-length = 88
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "node_modules",
    "deploy",
    "dist",
    "build",
]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "F",     # pyflakes
    "B",     # flake8-bugbear
    "S",     # flake8-bandit (security)
    "ASYNC", # async best practices
    "I",     # import sorting (isort replacement)
]

ignore = [
    "S101",  # assert allowed (tests / early dev)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]


######################################
# Bandit (baseline SAST)
######################################

[tool.bandit]
exclude_dirs = ["tests", ".venv", "venv", "build", "dist"]
targets = ["src"]


######################################
# Pytest
######################################

[tool.pytest.ini_options]
minversion = "7.0"

testpaths = ["tests"]
pythonpath = ["src"]

addopts = "-ra --strict-markers"

# Temporary: ignore Pydantic migration deprecation warnings during pytest
# Remove this after migrating GenericModel usage to Pydantic v2 APIs and
# re-running the test-suite for the v1 release.
filterwarnings = [
    "error::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
    "ignore::pydantic.warnings.PydanticDeprecatedSince20",
]

markers = [
    "slow: slow tests",
    "integration: integration tests",
]

repos:
  # -------------------------
  # Hooks setup
  # -------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  # -------------------------
  # Pre-commit checks
  # -------------------------
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: local
    hooks:
      - id: shfmt
        name: shfmt (shell scripts)
        entry: shfmt -w -i 4 -ci -sr
        language: system
        types: [shell]
        exclude: ^(\.venv/|venv/|node_modules/|private/|\.git/)

      - id: shellcheck
        name: shellcheck (shell scripts)
        entry: shellcheck -x
        language: system
        types: [shell]
        exclude: ^(\.venv/|venv/|node_modules/|private/|\.git/)

  - repo: local
    hooks:
      - id: actionlint
        name: actionlint (GitHub workflows)
        entry: actionlint
        language: system
        files: ^\.github/workflows/.*\.ya?ml$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        name: mypy (src, tests, and scripts)
        args:
          - --config-file
          - mypy.ini
          - --explicit-package-bases
        files: ^(src|tests|scripts)/
        additional_dependencies:
          - fastapi
          - starlette
          - pydantic==2.12.5
          - pydantic-settings==2.12.0
          - prometheus-client
          - pytest
          - pytest-asyncio
          - httpx
          - python-magic
          - PyYAML
          - types-PyYAML==6.0.12.20250915

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.1
    hooks:
      - id: bandit
        name: bandit (src)
        args:
          - --recursive
          - --severity-level
          - medium
          - --confidence-level
          - medium
          - src
        pass_filenames: false

  - repo: local
    hooks:
      - id: hadolint
        name: hadolint (Dockerfile)
        entry: hadolint ./Dockerfile
        language: system
        files: ^Dockerfile$

  - repo: local
    hooks:
      - id: pytest
        name: pytest (tests)
        entry: pytest -q tests
        language: system
        pass_filenames: false
        stages: [pre-commit]

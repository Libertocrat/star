services:
  star-init:
    image: busybox:1.37.0
    env_file: .env
    command: >
      sh -c "
        set -eu &&
        umask 022 &&
        mkdir -p '${STAR_ROOT_DIR:?STAR_ROOT_DIR is required}' &&
        chown -R '${STAR_CONTAINER_UID:-1001}:${STAR_CONTAINER_GID:-1001}' '${STAR_ROOT_DIR}' &&
        find '${STAR_ROOT_DIR}' -type d -print0 | xargs -0 -r chmod 755 &&
        find '${STAR_ROOT_DIR}' -type f -print0 | xargs -0 -r chmod 644
      "
    volumes:
      - star_data:${STAR_ROOT_DIR:?STAR_ROOT_DIR is required}
    restart: "no"

  star:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        STAR_CONTAINER_USER: ${STAR_CONTAINER_USER}
        STAR_CONTAINER_GROUP: ${STAR_CONTAINER_GROUP}
        STAR_CONTAINER_UID: ${STAR_CONTAINER_UID}
        STAR_CONTAINER_GID: ${STAR_CONTAINER_GID}
        STAR_APP_VERSION: ${STAR_APP_VERSION}
    restart: unless-stopped
    env_file: .env
    secrets:
      - star_api_token
    ports:
      - "${STAR_HOST_BIND_ADDRESS:-127.0.0.1}:${STAR_HOST_PORT:-8080}:${STAR_PORT:-8080}"
    volumes:
      - star_data:${STAR_ROOT_DIR:?STAR_ROOT_DIR is required}
    depends_on:
      star-init:
        condition: service_completed_successfully
    networks:
      - default_network

networks:
  default_network:
    external: true
    name: ${STAR_SHARED_NETWORK:?STAR_SHARED_NETWORK is required}

secrets:
  star_api_token:
    file: ./secrets/star_api_token.txt

volumes:
  star_data:
    name: ${STAR_DATA_VOLUME:?STAR_DATA_VOLUME is required}

name: CI

on:
  push:
    branches:
      - main
      - feat/**
      - feature/**
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering of the workflow from the GitHub UI

jobs:
  ci:
    name: Fast Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Environment setup
      # -------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements/**/*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # -------------------------
      # Tooling installation
      # -------------------------
      # `make` is available on GitHub-hosted runners by default.

      - name: Install hadolint
        run: |
          curl -sSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint
          hadolint --version

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

          shellcheck --version
          actionlint -version

      - name: Set up virtual environment and dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.txt

      # -------------------------
      # Quality Gate (Makefile)
      # -------------------------
      # Keep CI makefile-driven: lint, typecheck, baseline SAST, dependency audit, hadolint, tests.
      - name: Run CI pipeline (make ci)
        shell: bash
        run: |
          source .venv/bin/activate
          make ci

  build:
    name: Build Validation (Docker)
    runs-on: ubuntu-latest
    needs: ci

    steps:
      # -------------------------
      # Build Validation (Buildx)
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: seg:ci
          platforms: linux/amd64
          cache-from: type=gha,scope=seg
          cache-to: type=gha,mode=max,scope=seg

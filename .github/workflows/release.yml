name: Release

on:
  push:
    tags:
      - "v*" # trigger only on version tags like v1.2.3
  workflow_dispatch:

env:
  IMAGE_NAME: star
  IMAGE_OWNER: ${{ github.repository_owner }}

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch full history for accurate semver parsing

      # -------------------------
      # Normalize image metadata
      # -------------------------
      - name: Normalize image name and owner to lowercase
        run: |
          echo "IMAGE_NAME=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      # -------------------------
      # Docker setup
      # -------------------------
      - uses: docker/setup-buildx-action@v3 # enable BuildKit

      # -------------------------
      # Validate strict semver
      # -------------------------
      - name: Validate strict semver tag (vX.Y.Z)
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format. Expected vX.Y.Z"
            echo "Received: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Derive app version from tag
        run: |
          echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # -------------------------
      # Artifact distribution (GHCR)
      # -------------------------
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------
      # Extract Docker metadata
      # -------------------------
      - name: Extract image metadata (semver + sha tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{raw}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest

      # -------------------------
      # Build image locally
      # -------------------------
      - name: Build image locally (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          build-args: |
            STAR_APP_VERSION=${{ env.APP_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          load: true # load into local daemon for Trivy scan
          cache-from: type=gha,scope=star
          cache-to: type=gha,mode=max,scope=star

      # -------------------------
      # Install & Cache Trivy
      # -------------------------

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | \
            sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # -------------------------
      # Scan image
      # -------------------------
      - name: Scan image before publish (block on HIGH/CRITICAL)
        env:
          IMAGE_REF: ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            "$IMAGE_REF"

      # -------------------------
      # Artifact distribution (Docker Hub / GHCR)
      # -------------------------
      - name: Push semver + sha + latest tags
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | while read -r tag; do
            [ -n "$tag" ] || continue
            docker push "$tag"
          done

      # -------------------------
      # Release Assets (Deploy Bundle + OpenAPI)
      # -------------------------
      - name: Install release asset tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Setup Python for OpenAPI export
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements/**/*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies for OpenAPI export
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/runtime.txt
          python -m pip install -r requirements/testing.txt
          python -m pip install -e .

      - name: Export OpenAPI schema
        env:
          STAR_DOCS_ROOT_DIR: ${{ runner.temp }}/star-docs
        run: |
          export RELEASE_VERSION=${GITHUB_REF_NAME}
          python scripts/export_openapi.py

      - name: Prepare OpenAPI release assets
        shell: bash
        run: |
          set -Eeuo pipefail

          rm -rf dist
          mkdir -p dist

          cp "docs/api-docs/output/openapi.json" "dist/openapi.json"
          cp "dist/openapi.json" "dist/openapi-${GITHUB_REF_NAME}.json"

      - name: Build deploy bundle assets
        shell: bash
        run: |
          set -Eeuo pipefail

          bundle_name="star-deploy"
          versioned_bundle_name="${bundle_name}-${GITHUB_REF_NAME}"

          mkdir -p "dist/${bundle_name}"
          cp -a deploy/. "dist/${bundle_name}/"

          # Verify no sensitive .env files are accidentally included in the bundle
          if [[ -f "dist/${bundle_name}/star-runtime/.env" ]]; then
            echo "Refusing to package star-runtime/.env"
            exit 1
          fi

          # Verify no sensitive API token files are accidentally included in the bundle
          if [[ -f "dist/${bundle_name}/star-runtime/secrets/star_api_token.txt" ]]; then
            echo "Refusing to package star-runtime/secrets/star_api_token.txt"
            exit 1
          fi

          # Ensure scripts have executable permissions in the bundle
          chmod +x "dist/${bundle_name}/star"

          if [[ -d "dist/${bundle_name}/star-runtime/scripts" ]]; then
            find "dist/${bundle_name}/star-runtime/scripts" \
              -type f \
              -name "*.sh" \
              -exec chmod +x {} \;
          fi

          tar -C dist -czf "dist/${versioned_bundle_name}.tar.gz" "${bundle_name}"
          cp "dist/${versioned_bundle_name}.tar.gz" "dist/${bundle_name}.tar.gz"

          (
            cd dist
            zip -qr "${versioned_bundle_name}.zip" "${bundle_name}"
            cp "${versioned_bundle_name}.zip" "${bundle_name}.zip"
          )

      - name: Generate release checksums
        shell: bash
        run: |
          set -Eeuo pipefail

          (
            cd dist
            sha256sum \
              openapi.json \
              "openapi-${GITHUB_REF_NAME}.json" \
              "star-deploy-${GITHUB_REF_NAME}.tar.gz" \
              "star-deploy-${GITHUB_REF_NAME}.zip" \
              star-deploy.tar.gz \
              star-deploy.zip \
              > SHA256SUMS
          )

      - name: Validate release assets
        shell: bash
        run: |
          set -Eeuo pipefail

          test -f "dist/star-deploy-${GITHUB_REF_NAME}.tar.gz"
          test -f "dist/star-deploy-${GITHUB_REF_NAME}.zip"
          test -f "dist/star-deploy.tar.gz"
          test -f "dist/star-deploy.zip"
          test -f "dist/SHA256SUMS"

          tar_listing="$(mktemp)"
          tar -tzf "dist/star-deploy-${GITHUB_REF_NAME}.tar.gz" > "${tar_listing}"

          grep -qx 'star-deploy/star' "${tar_listing}"
          grep -qx 'star-deploy/README.md' "${tar_listing}"
          grep -q '^star-deploy/star-runtime/' "${tar_listing}"

          (
            cd dist
            sha256sum -c SHA256SUMS
          )

      # -------------------------
      # GitHub Release
      # -------------------------
      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/openapi.json
            dist/openapi-${{ github.ref_name }}.json
            dist/star-deploy-${{ github.ref_name }}.tar.gz
            dist/star-deploy-${{ github.ref_name }}.zip
            dist/star-deploy.tar.gz
            dist/star-deploy.zip
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

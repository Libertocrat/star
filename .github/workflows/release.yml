name: Release

on:
  push:
    tags:
      - "v*" # trigger only on version tags like v1.2.3
  workflow_dispatch:

env:
  IMAGE_NAME: seg
  IMAGE_OWNER: ${{ github.repository_owner }}

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch full history for accurate semver parsing

      # -------------------------
      # Normalize image metadata
      # -------------------------
      - name: Normalize image name and owner to lowercase
        run: |
          echo "IMAGE_NAME=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      # -------------------------
      # Docker setup
      # -------------------------
      - uses: docker/setup-buildx-action@v3 # enable BuildKit

      # -------------------------
      # Validate strict semver
      # -------------------------
      - name: Validate strict semver tag (vX.Y.Z)
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format. Expected vX.Y.Z"
            exit 1
          fi

      - name: Derive app version from tag
        run: |
          echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # -------------------------
      # Artifact distribution (GHCR)
      # -------------------------
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------
      # Extract Docker metadata
      # -------------------------
      - name: Extract image metadata (semver + sha tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{raw}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest

      # -------------------------
      # Build image locally
      # -------------------------
      - name: Build image locally (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          build-args: |
            SEG_APP_VERSION=${{ env.APP_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          load: true # load into local daemon for Trivy scan
          cache-from: type=gha,scope=seg
          cache-to: type=gha,mode=max,scope=seg

      # -------------------------
      # Install & Cache Trivy
      # -------------------------

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | \
            sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # -------------------------
      # Scan image
      # -------------------------
      - name: Scan image before publish (block on HIGH/CRITICAL)
        env:
          IMAGE_REF: ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            "$IMAGE_REF"

      # -------------------------
      # Artifact distribution (Docker Hub / GHCR)
      # -------------------------
      - name: Push semver + sha + latest tags
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | while read -r tag; do
            [ -n "$tag" ] || continue
            docker push "$tag"
          done

      # -------------------------
      # Release Assets (OpenAPI)
      # -------------------------
      - name: Setup Python for OpenAPI export
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements/**/*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies for OpenAPI export
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/runtime.txt
          python -m pip install -r requirements/testing.txt
          python -m pip install -e .

      - name: Export OpenAPI schema
        run: |
          export RELEASE_VERSION=${GITHUB_REF_NAME}
          python scripts/export_openapi.py

      - name: Create versioned OpenAPI copy
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          cp docs/api-docs/output/openapi.json "openapi-${RELEASE_TAG}.json"

      # -------------------------
      # GitHub Release
      # -------------------------
      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            docs/api-docs/output/openapi.json
            openapi-${{ github.ref_name }}.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

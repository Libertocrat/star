name: Security

on:
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly deep security scan (Monday 03:00 UTC)
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  security:
    name: Deep Security Analysis
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: star
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # Environment setup
      # -------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements/**/*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # -------------------------
      # Dependency installation
      # -------------------------
      - name: Set up virtual environment and dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements/runtime.txt
          python -m pip install -r requirements/security.txt

      # -------------------------
      # SAST (Semgrep)
      # -------------------------
      - name: Install Semgrep CLI
        shell: bash
        run: |
          source .venv/bin/activate
          make semgrep-install

      - name: Run Semgrep
        shell: bash
        run: |
          source .venv/bin/activate
          make semgrep

      # -------------------------
      # Vulnerability Scanning (Trivy)
      # -------------------------
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}

      # Trivy is installed here, but filesystem scan remains makefile-driven.
      - name: Install Trivy CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -

          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
            sudo tee -a /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

          trivy --version

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          jq --version

      - name: Run Trivy filesystem scan
        shell: bash
        run: |
          source .venv/bin/activate
          make trivy-fs

      - name: Run Trivy image scan
        shell: bash
        run: |
          source .venv/bin/activate
          make trivy-image IMAGE_NAME=${{ env.IMAGE_NAME }} IMAGE_TAG=${{ env.IMAGE_TAG }}

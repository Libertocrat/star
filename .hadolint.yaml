# Hadolint configuration for Secure Templated Actions Runtime (STAR)

# Treat warnings as warnings (do not fail on style recommendations)
failure-threshold: error

# Explicitly ignored rules (documented decisions)
ignored:
  - DL3008  # Package versions not pinned (Debian-based python image provides stability)
  - DL3015  # Allow recommended packages when explicitly chosen

# Disable color output (better for CI logs)
no-color: false
# Enable verbose output for debugging
verbose: false
